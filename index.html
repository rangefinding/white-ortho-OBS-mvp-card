<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Smiles MVPs – Training Stats</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --teal:   #49b0b6;
            --pink:   #f50ca0;
            --yellow: #fae35e;
            --purple: #9b7dbd;
            --slate:  #9bafb2;
            --dark:   #424040;
            --cream:  #fefff8;
            --border: #d6d3cc;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            padding: 20px 16px 40px;
            background: linear-gradient(135deg, var(--teal) 0%, var(--slate) 100%);
            min-height: 100vh;
        }

        /* ══════════ TAB BAR ══════════ */
        .tab-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 22px;
            flex-wrap: wrap;
        }

        .tab-btn {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            letter-spacing: 1px;
            padding: 10px 28px 10px 22px;
            border: 2.5px solid rgba(255,255,255,0.7);
            border-radius: 30px;
            background: rgba(255,255,255,0.2);
            color: white;
            cursor: pointer;
            transition: all 0.22s ease;
            text-align: left;
            line-height: 1.2;
            position: relative;
        }

        .tab-btn .tab-sub {
            font-family: 'Montserrat', sans-serif;
            font-size: 10px;
            font-weight: 600;
            display: block;
            opacity: 0.75;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            margin-top: 1px;
        }

        .tab-btn .dot {
            position: absolute;
            top: 10px; right: 10px;
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--yellow);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .tab-btn.has-data .dot { opacity: 1; }

        .tab-btn.active {
            background: white;
            color: var(--teal);
            border-color: white;
            box-shadow: 0 4px 18px rgba(0,0,0,0.22);
        }

        .tab-btn:hover:not(.active) {
            background: rgba(255,255,255,0.35);
        }

        /* ══════════ PANELS ══════════ */
        .panel { display: none; }
        .panel.active { display: block; }

        /* ══════════ FORM CARD ══════════ */
        .form-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.25);
            padding: 32px 28px 24px;
            max-width: 640px;
            width: 100%;
            margin: 0 auto 24px;
            position: relative;
            overflow: hidden;
        }

        .form-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 8px;
            background: linear-gradient(90deg, var(--teal), var(--pink), var(--yellow), var(--teal));
        }

        .header { text-align: center; margin-bottom: 26px; }

        .logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 30px;
            color: var(--dark);
            letter-spacing: 2px;
            margin-bottom: 4px;
        }

        .program-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            letter-spacing: 0.5px;
        }

        .program-name .future { color: var(--dark); }
        .program-name .smiles { color: var(--teal); }
        .program-name .mvps   { color: var(--purple); }

        /* ══════════ SECTIONS ══════════ */
        .form-section {
            margin-bottom: 18px;
            background: var(--cream);
            border-radius: 12px;
            padding: 18px 20px;
            border: 2px solid var(--border);
        }

        .section-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            color: var(--dark);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.5px;
        }

        .section-icon { font-size: 20px; }

        /* ══════════ FORM ROWS ══════════ */
        .form-row { display: flex; flex-direction: column; margin-bottom: 12px; }
        .form-row:last-child { margin-bottom: 0; }
        .form-row.inline { flex-direction: row; gap: 12px; }
        .form-row.inline .input-group { flex: 1; }
        .form-row.col-3.inline .input-group { flex: 1; }

        .input-group { display: flex; flex-direction: column; }

        label {
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 5px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .label-note {
            font-size: 10px;
            color: var(--slate);
            font-style: italic;
            font-weight: 400;
            text-transform: none;
            letter-spacing: 0;
        }

        input[type="text"],
        input[type="number"],
        input[type="date"],
        select,
        textarea {
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 13px;
            font-family: 'Montserrat', sans-serif;
            transition: border-color 0.2s, box-shadow 0.2s;
            width: 100%;
            background: white;
            color: var(--dark);
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--teal);
            box-shadow: 0 0 0 3px rgba(73,176,182,0.14);
        }

        input[readonly] {
            background: #f5f5f0;
            color: var(--teal);
            font-weight: 700;
        }

        /* ══════════ TOOLTIP ══════════ */
        .tip-wrap {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .tip-icon {
            width: 17px; height: 17px;
            background: var(--teal);
            color: white;
            border-radius: 50%;
            font-size: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: help;
            font-weight: 800;
            flex-shrink: 0;
            position: relative;
        }

        .tip-icon:hover .tip-box { display: block; }

        .tip-box {
            display: none;
            position: absolute;
            bottom: calc(100% + 10px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--dark);
            color: white;
            padding: 11px 14px;
            border-radius: 10px;
            font-size: 11.5px;
            width: 270px;
            z-index: 200;
            line-height: 1.55;
            font-weight: 400;
            font-family: 'Montserrat', sans-serif;
            text-transform: none;
            letter-spacing: 0;
            pointer-events: none;
            text-align: left;
        }

        .tip-box::after {
            content: '';
            position: absolute;
            top: 100%; left: 50%; transform: translateX(-50%);
            border: 7px solid transparent;
            border-top-color: var(--dark);
        }

        /* ══════════ AGE DISPLAY ══════════ */
        .age-display {
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, rgba(73,176,182,0.1), rgba(155,125,189,0.08));
            border: 2px solid var(--teal);
            border-radius: 8px;
            padding: 10px 14px;
            margin-top: 6px;
        }

        .age-display .age-val {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 26px;
            color: var(--teal);
            letter-spacing: 1px;
            line-height: 1;
        }

        .age-display .age-label {
            font-size: 11px;
            color: var(--dark);
            font-weight: 600;
            line-height: 1.4;
        }

        .age-display .age-label span {
            display: block;
            color: var(--slate);
            font-weight: 400;
            font-style: italic;
        }

        /* ══════════ SLIDER ══════════ */
        .slider-wrap { position: relative; margin: 8px 0; }

        .slider-track {
            position: absolute; top: 50%; transform: translateY(-50%);
            left: 0; height: 12px; width: 100%;
            background: var(--border); border-radius: 6px; z-index: 0;
        }

        .slider-progress {
            position: absolute; top: 50%; transform: translateY(-50%);
            left: 0; height: 12px; width: 50%;
            background: linear-gradient(90deg, var(--teal), var(--pink));
            border-radius: 6px; z-index: 1;
            transition: width 0.3s ease;
        }

        .readiness-slider {
            width: 100%; height: 12px;
            -webkit-appearance: none; appearance: none;
            background: transparent;
            border-radius: 6px; outline: none;
            position: relative; z-index: 2;
        }

        .readiness-slider::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 26px; height: 26px;
            background: white; cursor: pointer;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.28);
            border: 3px solid var(--teal);
        }

        .readiness-slider::-moz-range-thumb {
            width: 26px; height: 26px;
            background: white; cursor: pointer;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.28);
            border: 3px solid var(--teal);
        }

        .readiness-value {
            text-align: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            color: var(--dark);
            margin-top: 6px;
            letter-spacing: 1px;
        }

        /* ══════════ CHECKBOXES ══════════ */
        .checkbox-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 9px;
            margin-top: 4px;
        }

        .check-label {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 10px 13px;
            border: 2px solid var(--border);
            border-radius: 9px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 13px;
            font-weight: 600;
            color: var(--dark);
            text-transform: none;
            letter-spacing: 0;
            background: white;
        }

        .check-label:hover {
            border-color: var(--teal);
            background: rgba(73,176,182,0.05);
        }

        .check-label input[type="checkbox"] { display: none; }

        .check-box {
            width: 20px; height: 20px;
            border: 2.5px solid var(--border);
            border-radius: 5px;
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
            background: white;
        }

        .check-label input:checked ~ .check-box {
            background: var(--teal);
            border-color: var(--teal);
        }

        .check-label input:checked ~ .check-box::after {
            content: '✓';
            color: white;
            font-size: 12px;
            font-weight: 800;
        }

        .check-label input:checked ~ .check-text { color: var(--teal); }

        .check-label:has(input:checked) {
            border-color: var(--teal);
            background: rgba(73,176,182,0.07);
        }

        .check-emoji { font-size: 16px; }

        /* ══════════ BUTTONS ══════════ */
        .buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 22px 0 14px;
            flex-wrap: wrap;
        }

        .btn {
            font-family: 'Bebas Neue', sans-serif;
            border: none;
            padding: 13px 22px;
            border-radius: 30px;
            font-size: 16px;
            letter-spacing: 0.6px;
            cursor: pointer;
            transition: all 0.22s ease;
            display: flex;
            align-items: center;
            gap: 7px;
            text-decoration: none;
        }

        .btn-generate {
            background: linear-gradient(135deg, var(--teal), #38969b);
            color: white;
            box-shadow: 0 4px 16px rgba(73,176,182,0.4);
        }

        .btn-download {
            background: linear-gradient(135deg, var(--pink), #c70885);
            color: white;
            box-shadow: 0 4px 16px rgba(245,12,160,0.3);
        }

        .btn-clear {
            background: white;
            color: var(--slate);
            border: 2px solid var(--border);
            box-shadow: none;
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.06);
        }

        .btn-clear:hover {
            border-color: #c0bcb6;
            color: var(--dark);
            filter: none;
        }

        /* ══════════ PRINT CARD ══════════ */
        .print-card {
            display: none;
            background: white;
            max-width: 640px;
            margin: 0 auto 30px;
            padding: 20px 26px;
            border-radius: 14px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .pc-header {
            text-align: center;
            margin-bottom: 14px;
            padding-bottom: 12px;
            position: relative;
        }

        .pc-header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 50%; transform: translateX(-50%);
            width: 80%; height: 3px;
            background: linear-gradient(90deg, var(--teal), var(--pink), var(--yellow));
            border-radius: 2px;
        }

        .pc-logo {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px; color: var(--dark);
            letter-spacing: 2px; margin-bottom: 2px;
        }

        .pc-prog {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 16px; color: var(--teal); letter-spacing: 0.5px;
        }

        .pc-patient-box {
            background: linear-gradient(135deg, var(--teal), var(--slate));
            border-radius: 10px;
            padding: 13px 16px; margin-bottom: 13px;
            color: white; text-align: center;
        }

        .pc-patient-name {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 24px; margin-bottom: 3px; letter-spacing: 0.5px;
        }

        .pc-visit-info { font-size: 12px; opacity: 0.92; margin-top: 2px; }

        .pc-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 9px; margin-bottom: 13px;
        }

        .pc-stat {
            background: var(--cream);
            border: 2px solid var(--teal);
            border-radius: 8px;
            padding: 9px 6px; text-align: center;
        }

        .pc-stat-label {
            font-size: 9px; color: var(--dark);
            font-weight: 700; margin-bottom: 4px;
            text-transform: uppercase; letter-spacing: 0.3px;
        }

        .pc-stat-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 15px; color: var(--pink); letter-spacing: 0.3px;
        }

        .pc-progress {
            background: rgba(73,176,182,0.07);
            border-radius: 10px;
            padding: 12px 14px; margin-bottom: 11px;
            border: 2px solid var(--teal);
        }

        .pc-section-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 14px; color: var(--dark);
            margin-bottom: 8px; letter-spacing: 0.5px;
        }

        .pc-row {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
        }

        .pc-row:last-child { border-bottom: none; }
        .pc-row-label { font-weight: 700; color: var(--dark); }

        .pc-row-value {
            font-weight: 700;
            background: #d3f5f7;
            padding: 2px 9px;
            border-radius: 12px;
            color: var(--dark);
        }

        .pc-equipment {
            background: rgba(155,125,189,0.08);
            border-radius: 10px;
            padding: 11px 14px; margin-bottom: 11px;
            border: 2px solid var(--purple);
        }

        .pc-equip-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 14px; color: var(--dark);
            margin-bottom: 8px; letter-spacing: 0.5px;
        }

        .pc-equip-tags {
            display: flex; flex-wrap: wrap; gap: 6px;
        }

        .pc-equip-tag {
            background: var(--purple);
            color: white;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 13px;
            letter-spacing: 0.5px;
            padding: 4px 12px;
            border-radius: 20px;
        }

        .pc-gameplan {
            background: rgba(73,176,182,0.09);
            border-radius: 10px;
            padding: 11px 14px; margin-bottom: 11px;
            border: 2px solid var(--teal);
        }

        .pc-gameplan-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 14px; color: var(--dark);
            margin-bottom: 5px; letter-spacing: 0.5px;
        }

        .pc-gameplan-text {
            color: var(--dark); font-size: 12px;
            line-height: 1.55; font-weight: 500;
        }

        .pc-footer {
            text-align: center;
            padding-top: 11px;
            border-top: 2px solid var(--teal);
        }

        .pc-cheer {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px; color: var(--pink);
            margin-bottom: 5px; letter-spacing: 0.5px;
        }

        .pc-next {
            color: var(--dark); font-size: 12px; font-weight: 700;
        }

        /* ══════════ PRINT MEDIA ══════════ */
        @media print {
            body { background: white !important; padding: 0; }

            .tab-bar,
            .form-container,
            .buttons { display: none !important; }

            .panel { display: block !important; }
            body[data-print-slot="1"] .panel[data-slot="2"],
            body[data-print-slot="1"] .panel[data-slot="3"] { display: none !important; }
            body[data-print-slot="2"] .panel[data-slot="1"],
            body[data-print-slot="2"] .panel[data-slot="3"] { display: none !important; }
            body[data-print-slot="3"] .panel[data-slot="1"],
            body[data-print-slot="3"] .panel[data-slot="2"] { display: none !important; }

            .print-card {
                display: block !important;
                box-shadow: none;
                margin: 0 auto;
                max-width: 680px;
                padding: 15px 22px;
            }

            * {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }

        /* ══════════ RESPONSIVE ══════════ */
        @media (max-width: 580px) {
            .form-row.inline { flex-direction: column; }
            .pc-stats { grid-template-columns: 1fr 1fr; }
            .tab-btn { font-size: 15px; padding: 8px 18px; }
        }
    </style>
</head>
<body>

<!-- ══════════ TAB BAR ══════════ -->
<div class="tab-bar">
    <button class="tab-btn active" id="tab-1" onclick="switchTab(1)">
        👤 Patient 1
        <span class="tab-sub" id="tab1-preview">No patient loaded</span>
        <span class="dot"></span>
    </button>
    <button class="tab-btn" id="tab-2" onclick="switchTab(2)">
        👤 Patient 2
        <span class="tab-sub" id="tab2-preview">No patient loaded</span>
        <span class="dot"></span>
    </button>
    <button class="tab-btn" id="tab-3" onclick="switchTab(3)">
        👤 Patient 3
        <span class="tab-sub" id="tab3-preview">No patient loaded</span>
        <span class="dot"></span>
    </button>
</div>

<!-- ══════════════════════════════ PATIENT PANELS ══════════════════════════════ -->
<!-- Panels are rendered by JS below to avoid 3x HTML duplication -->
<div id="panels-container"></div>

<script>
/* ═══════════════════════════ CONSTANTS ═══════════════════════════ */

const SLOTS = [1, 2, 3];

const READINESS_MAP = {
    'ready_now': 100,
    '1_3':       88,
    '3_6':       72,
    '6_12':      52,
    '12_18':     32,
    '18_plus':   15,
    '':          50
};

const COUNTDOWN_LABELS = {
    'ready_now': '🚀 Ready Now!',
    '1_3':       '1–3 Months',
    '3_6':       '3–6 Months',
    '6_12':      '6–12 Months',
    '12_18':     '12–18 Months',
    '18_plus':   '18+ Months'
};

const EQUIPMENT = [
    { id: 'expander',   emoji: '🔧', label: 'Expander' },
    { id: 'braces',     emoji: '✨', label: 'Digital Braces' },
    { id: 'invisalign', emoji: '💎', label: 'Invisalign' },
    { id: 'bands',      emoji: '💪', label: 'Rubber Bands' }
];

const TEMPLATES = [
    { value: 'molars',     text: "🦷 Just waiting on those 12-year molars to fully erupt—then we're game day ready!" },
    { value: 'baby_teeth', text: "⭐ You've got a couple more baby teeth ready to make their exit—keep wiggling and we'll be starting lineup ready soon!" },
    { value: 'hygiene',    text: "🏆 Your oral hygiene game is STRONG! Keep brushing and flossing like the MVP you are—we're almost at kickoff!" },
    { value: 'growth',     text: "💪 Your jaw is developing beautifully! We're watching your growth spurts like a scout at the championship—exciting times ahead!" },
    { value: 'ready',      text: "🚀 You're in the red zone! Everything is looking perfect and we're ready to start treatment at your next visit. LET'S GO!" },
    { value: 'monitoring', text: "🔍 We're keeping a close eye on your bite and spacing—like watching game film to call the perfect play. Stay tuned!" }
];

/* ═══════════════════════════ BUILD PANELS ═══════════════════════════ */

function buildPanel(slot) {
    const p = `p${slot}-`;

    const equipHTML = EQUIPMENT.map(eq => `
        <label class="check-label">
            <input type="checkbox" id="${p}equip-${eq.id}">
            <span class="check-box"></span>
            <span class="check-emoji">${eq.emoji}</span>
            <span class="check-text">${eq.label}</span>
        </label>
    `).join('');

    const templateOpts = TEMPLATES.map(t =>
        `<option value="${t.value}">${t.text}</option>`
    ).join('');

    return `
    <div class="panel${slot === 1 ? ' active' : ''}" data-slot="${slot}" id="panel-${slot}">

      <div class="form-container">
        <div class="header">
          <div class="logo">WHITE ORTHODONTICS</div>
          <div class="program-name">
            <span class="future">FUTURE</span> <span class="smiles">SMILES</span> <span class="mvps">MVPS</span>
          </div>
        </div>

        <form id="mvpForm-${slot}">

          <!-- ── PATIENT INFORMATION ── -->
          <div class="form-section">
            <div class="section-title"><span class="section-icon">🏆</span> Patient Information</div>

            <div class="form-row inline">
              <div class="input-group">
                <label>Patient Name</label>
                <input type="text" id="${p}patientName" placeholder="Enter patient name" required
                       oninput="updateTabPreview(${slot})">
              </div>
              <div class="input-group">
                <label>Training Session Date</label>
                <input type="date" id="${p}visitDate" required>
              </div>
            </div>

            <!-- BIRTHDATE + AUTO AGE -->
            <div class="form-row inline">
              <div class="input-group">
                <label>

}

// Render all 3 panels
document.getElementById('panels-container').innerHTML =
    SLOTS.map(buildPanel).join('');

/* ═══════════════════════════ DROPDOWNS ═══════════════════════════ */

function populateHeightSelect(id) {
    const sel = g(id);
    const isOpt = id.includes('previous');
    addOpt(sel, '', isOpt ? 'Select previous height' : 'Select height');
    for (let ft = 3; ft <= 6; ft++) {
        const maxIn = ft === 6 ? 0 : 11;
        const minIn = ft === 3 ? 5 : 0;
        for (let i = minIn; i <= maxIn; i++) {
            addOpt(sel, `${ft}'${i}"`, `${ft}'${i}"`);
        }
    }
}

function populateTimeSelect(id) {
    const sel = g(id);
    addOpt(sel, '', 'Select time');
    for (let hr = 7; hr <= 16; hr++) {
        for (let mn = 0; mn < 60; mn += 10) {
            if (hr === 16 && mn > 40) break;
            const dhr = hr > 12 ? hr - 12 : hr;
            const ampm = hr >= 12 ? 'PM' : 'AM';
            const ms = mn.toString().padStart(2, '0');
            addOpt(sel, `${hr.toString().padStart(2,'0')}:${ms}`, `${dhr}:${ms} ${ampm}`);
        }
    }
}

function addOpt(sel, val, txt) {
    const o = document.createElement('option');
    o.value = val; o.textContent = txt;
    sel.appendChild(o);
}

SLOTS.forEach(slot => {
    populateHeightSelect(`p${slot}-currentHeight`);
    populateHeightSelect(`p${slot}-previousHeight`);
    populateTimeSelect(`p${slot}-nextVisitTime`);
    g(`p${slot}-visitDate`).value = today();

    const slider    = g(`p${slot}-readinessLevel`);
    const valueEl   = g(`p${slot}-readinessValue`);
    const progressEl = g(`p${slot}-sliderProgress`);

    slider.addEventListener('input', function() {
        valueEl.textContent     = this.value + '%';
        progressEl.style.width  = this.value + '%';
    });
});

/* ═══════════════════════════ HELPERS ═══════════════════════════ */

function g(id) { return document.getElementById(id); }
function today() { return new Date().toISOString().split('T')[0]; }
function p(slot, field) { return g(`p${slot}-${field}`); }

function formatTime(time) {
    const [h, m] = time.split(':');
    const hr = parseInt(h);
    return `${hr > 12 ? hr - 12 : hr}:${m} ${hr >= 12 ? 'PM' : 'AM'}`;
}

/* ═══════════════════════════ AGE CALC ═══════════════════════════ */

function calcAge(slot) {
    const bval = p(slot, 'birthdate').value;
    if (!bval) return;
    const birth = new Date(bval + 'T00:00:00');
    const now   = new Date();
    let years  = now.getFullYear() - birth.getFullYear();
    let months = now.getMonth()    - birth.getMonth();
    if (now.getDate() < birth.getDate()) months--;
    if (months < 0) { years--; months += 12; }

    const ageStr = `${years}.${months}`;
    p(slot, 'patientAge').value      = ageStr;
    g(`p${slot}-ageVal`).textContent = ageStr;
    g(`p${slot}-ageSub`).textContent = `${years} yrs, ${months} mo`;
}

/* ═══════════════════════════ COUNTDOWN → READINESS ═══════════════════════════ */

function onCountdownChange(slot) {
    const val = p(slot, 'countdownClock').value;
    const pct = READINESS_MAP[val] ?? 50;
    g(`p${slot}-readinessLevel`).value = pct;
    g(`p${slot}-readinessValue`).textContent = pct + '%';
    g(`p${slot}-sliderProgress`).style.width = pct + '%';
}

/* ═══════════════════════════ DAY OF WEEK ═══════════════════════════ */

function updateDayOfWeek(slot) {
    const val = p(slot, 'nextVisitDate').value;
    if (!val) return;
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    p(slot, 'nextVisitDay').value = days[new Date(val + 'T00:00:00').getDay()];
}

/* ═══════════════════════════ GAME PLAN TEMPLATE ═══════════════════════════ */

function updateGamePlan(slot) {
    const sel = p(slot, 'gamePlanTemplate');
    if (!sel.value) return;
    const txt = sel.options[sel.selectedIndex].textContent
        .replace(/^[\u{1F300}-\u{1FFFF}✨🔧💎💪🦷⭐🏆🚀🔍]\s*/u, '');
    p(slot, 'nextSteps').value = txt;
}

/* ═══════════════════════════ TABS ═══════════════════════════ */

function switchTab(slot) {
    document.querySelectorAll('.panel').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    g('panel-' + slot).classList.add('active');
    g('tab-' + slot).classList.add('active');
}

function updateTabPreview(slot) {
    const name = p(slot, 'patientName').value.trim();
    g(`tab${slot}-preview`).textContent = name || 'No patient loaded';
    g('tab-' + slot).classList.toggle('has-data', !!name);
}

/* ═══════════════════════════ GET EQUIPMENT ═══════════════════════════ */

function getEquipment(slot) {
    return EQUIPMENT
        .filter(eq => g(`p${slot}-equip-${eq.id}`).checked)
        .map(eq => `${eq.emoji} ${eq.label}`);
}

/* ═══════════════════════════ GENERATE CARD ═══════════════════════════ */

function generateCard(slot) {
    const name      = p(slot, 'patientName').value.trim();
    const visitDate = p(slot, 'visitDate').value;
    if (!name || !visitDate) {
        alert('Please fill in Patient Name and Training Session Date at minimum.');
        return;
    }

    const age        = p(slot, 'patientAge').value;
    const birthdate  = p(slot, 'birthdate').value;
    const recallType = p(slot, 'recallType').value;
    const curH       = p(slot, 'currentHeight').value;
    const prevH      = p(slot, 'previousHeight').value;
    const gripR      = p(slot, 'gripRight').value;
    const gripL      = p(slot, 'gripLeft').value;
    const shoe       = p(slot, 'shoeSize').value;
    const dental     = p(slot, 'dentalDevelopment').value;
    const countdown  = p(slot, 'countdownClock').value;
    const readiness  = p(slot, 'readinessLevel').value;
    const nextSteps  = p(slot, 'nextSteps').value;
    const nextDate   = p(slot, 'nextVisitDate').value;
    const nextDay    = p(slot, 'nextVisitDay').value;
    const nextTime   = p(slot, 'nextVisitTime').value;
    const equipment  = getEquipment(slot);

    const visitFmt = new Date(visitDate + 'T00:00:00').toLocaleDateString('en-US', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    // Birth formatted
    const bdFmt = birthdate
        ? new Date(birthdate + 'T00:00:00').toLocaleDateString('en-US', {
            month: 'long', day: 'numeric', year: 'numeric'
        })
        : null;

    const heightDisplay = prevH
        ? `${curH} <span style="color:#27ae60;font-size:11px">(+growth!)</span>`
        : (curH || '--');

    const gripDisplay = (gripR || gripL)
        ? `R: ${gripR || '--'} | L: ${gripL || '--'}`
        : '--';

    let nextVisitDisplay = 'TBD';
    if (nextDate) {
        const ndf = new Date(nextDate + 'T00:00:00').toLocaleDateString('en-US', {
            month: 'long', day: 'numeric', year: 'numeric'
        });
        nextVisitDisplay = nextDay && nextTime
            ? `${ndf}, ${nextDay} at ${formatTime(nextTime)}`
            : ndf;
    }

    const countdownLabel = COUNTDOWN_LABELS[countdown] || 'TBD';

    const equipSection = equipment.length > 0 ? `
        <div class="pc-equipment">
            <div class="pc-equip-title">🛠️ ANTICIPATED EQUIPMENT</div>
            <div class="pc-equip-tags">
                ${equipment.map(e => `<div class="pc-equip-tag">${e}</div>`).join('')}
            </div>
        </div>
    ` : '';

    const html = `
        <div class="pc-patient-box">
            <div class="pc-patient-name">${name}</div>
            <div class="pc-visit-info">${visitFmt}</div>
            ${bdFmt ? `<div class="pc-visit-info">🎂 DOB: ${bdFmt}</div>` : ''}
            ${age   ? `<div class="pc-visit-info">📊 Ortho Age: ${age} (${p(slot, 'ageSub') ? g(`p${slot}-ageSub`).textContent : age})</div>` : ''}
        </div>

        <div class="pc-stats">
            <div class="pc-stat">
                <div class="pc-stat-label">Height</div>
                <div class="pc-stat-value">${heightDisplay}</div>
            </div>
            <div class="pc-stat">
                <div class="pc-stat-label">Grip Strength</div>
                <div class="pc-stat-value" style="font-size:12px">${gripDisplay} lbs</div>
            </div>
            <div class="pc-stat">
                <div class="pc-stat-label">Shoe Size</div>
                <div class="pc-stat-value">${shoe || '--'}</div>
            </div>
            <div class="pc-stat">
                <div class="pc-stat-label">Position</div>
                <div class="pc-stat-value">${recallType ? recallType.replace('Recall ', '') : 'TBD'}</div>
            </div>
        </div>

        <div class="pc-progress">
            <div class="pc-section-title">🏆 Training Progress Report</div>
            <div class="pc-row">
                <span class="pc-row-label">Dental Development:</span>
                <span class="pc-row-value">${dental || 'Not assessed'}</span>
            </div>
            <div class="pc-row">
                <span class="pc-row-label">Countdown Clock:</span>
                <span class="pc-row-value">${countdownLabel}</span>
            </div>
            <div class="pc-row">
                <span class="pc-row-label">MVP Readiness:</span>
                <span class="pc-row-value">${readiness}% Ready</span>
            </div>
        </div>

        ${equipSection}

        <div class="pc-gameplan">
            <div class="pc-gameplan-title">🎯 YOUR GAME PLAN</div>
            <div class="pc-gameplan-text">${nextSteps || "Keep training hard—you're doing amazing!"}</div>
        </div>

        <div class="pc-footer">
            <div class="pc-cheer">Keep Training Hard, Future MVP!</div>
            <div class="pc-next">⏰ Next Session: ${nextVisitDisplay}</div>
        </div>
    `;

    g(`p${slot}-cardContent`).innerHTML = html;
    g(`p${slot}-printCard`).style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ═══════════════════════════ DOWNLOAD ═══════════════════════════ */

function downloadAsImage(slot) {
    const card    = g(`p${slot}-printCard`);
    const content = g(`p${slot}-cardContent`).innerHTML.trim();

    if (card.style.display === 'none' || !content) {
        alert('Generate the MVP Card first, then save it! ⚡');
        return;
    }

    // Temporarily hide everything except the card
    const tabBar      = document.querySelector('.tab-bar');
    const formCon     = document.querySelector(`#panel-${slot} .form-container`);
    const otherPanels = SLOTS.filter(s => s !== slot).map(s => g('panel-' + s));

    tabBar.style.display    = 'none';
    formCon.style.display   = 'none';
    otherPanels.forEach(el => el.style.display = 'none');
    card.style.background   = 'white';

    html2canvas(card, {
        scale: 2,
        backgroundColor: '#ffffff',
        logging: false,
        width:  card.offsetWidth,
        height: card.offsetHeight
    }).then(canvas => {
        canvas.toBlob(blob => {
            const url  = URL.createObjectURL(blob);
            const link = document.createElement('a');
            const name = p(slot, 'patientName').value.replace(/\s+/g, '_') || 'Patient';
            link.download = `MVP_Card_${name}.jpg`;
            link.href = url;
            link.click();
            URL.revokeObjectURL(url);

            tabBar.style.display    = '';
            formCon.style.display   = '';
            otherPanels.forEach(el => el.style.display = '');

            alert(`✅ MVP Card saved for ${p(slot,'patientName').value}!\nReady to text to your patient. 🏆`);
        }, 'image/jpeg', 0.95);
    }).catch(err => {
        console.error(err);
        tabBar.style.display    = '';
        formCon.style.display   = '';
        otherPanels.forEach(el => el.style.display = '');
        alert('Error generating image — please try again.');
    });
}

/* ═══════════════════════════ CLEAR ═══════════════════════════ */

function clearForm(slot) {
    const name = p(slot, 'patientName').value.trim();
    const msg  = name
        ? `Clear all data for ${name} and start fresh?`
        : 'Clear all form data for this patient slot?';
    if (!confirm(msg)) return;

    g(`mvpForm-${slot}`).reset();
    g(`p${slot}-visitDate`).value          = today();
    g(`p${slot}-readinessValue`).textContent = '50%';
    g(`p${slot}-sliderProgress`).style.width = '50%';
    g(`p${slot}-readinessLevel`).value       = 50;
    g(`p${slot}-printCard`).style.display    = 'none';
    g(`p${slot}-cardContent`).innerHTML      = '';
    g(`p${slot}-ageVal`).textContent         = '—';
    g(`p${slot}-ageSub`).textContent         = 'Enter birthdate to auto-fill';
    g(`p${slot}-patientAge`).value           = '';
    updateTabPreview(slot);
}
